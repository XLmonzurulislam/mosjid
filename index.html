<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Embed</title>
    <style>
        .embed-container {
            position: relative;
            width: 100%;
            height: 600px; /* Apnar proyojon moto height bariye ba komiye nite paren */

        .embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Amar Website-ti Niche Dekha Jacche:</h2>

    </div>
